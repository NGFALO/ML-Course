  --warm-bg:#FFF3E0;--warm-bd:#FFD89B;--warm-ink:#E8810C;
  --vio-bg:#F1ECFF;--vio-bd:#D6C9FF;--vio-ink:#6D4AFF;

  --good-soft:#E6F6EC;--good-ink:#0B7551;--good-bd:#2F9E44;--good-line:#C6EAD4;
  --bad-soft:#FBE3E3;--bad-ink:#A11D1D;--bad-bd:#E03131;--bad-line:#F3C0C0;
  --warn-soft:#FFF3D6;--warn-ink:#8A5A00;
  --hero1:#2A2342;--hero2:#3D3460;--shadow:rgba(40,30,60,.16);
}
[data-theme="dark"]{
  color-scheme:dark;
  --bg:#100E16;--surface:#16131E;--card:#221D2E;--soft:#2A2536;
  --ink:#ECE8F5;--ink-soft:#CFC8DD;--ink-2:#9A92AC;--ink-3:#6E6680;
  --line:#2E2A39;--line-2:#37313F;--track:#2C2738;--ring:#2C2738;
  --primary:#8B6BFF;--primary-d:#5A3FD6;--primary-soft:#271F3A;--primary-ink:#A98BFF;
  --warm-bg:#33240F;--warm-bd:#5A3F15;--warm-ink:#F5A623;
  --vio-bg:#271F3A;--vio-bd:#3A2F55;--vio-ink:#A98BFF;
  --grn-bg:#13291F;--grn-bd:#214635;--grn-ink:#34C796;
  --good-soft:#15301F;--good-ink:#4ADE9A;--good-bd:#2F9E44;--good-line:#244A35;
  --bad-soft:#341A1C;--bad-ink:#FF8B8B;--bad-bd:#E5484D;--bad-line:#4A2A2C;
  --warn-soft:#332813;--warn-ink:#E8B04B;
  --hero1:#221C32;--hero2:#312A47;--shadow:rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hanken Grotesk',system-ui,sans-serif;background:var(--bg);color:var(--ink);transition:background .3s;}
::-webkit-scrollbar{width:0;height:0;}
@keyframes vk-rise{from{transform:translateY(9px);opacity:0;}to{transform:none;opacity:1;}}
@keyframes vk-float{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
@keyframes vk-pop{0%{transform:scale(.92);}60%{transform:scale(1.03);}100%{transform:scale(1);}}
@keyframes slide-in{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

.app-bg{min-height:100vh;display:flex;justify-content:center;background:var(--bg);}
@media(min-width:540px){
  .app-bg{align-items:center;padding:26px 0;}
  .app-col{min-height:0!important;height:calc(100vh - 52px);border-radius:32px;box-shadow:0 34px 90px -34px var(--shadow)!important;}
}
.app-col{width:100%;max-width:480px;background:var(--surface);min-height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden;box-shadow:0 0 80px var(--shadow);}

/* TOP BAR */
#top-bar{position:sticky;top:0;z-index:30;background:var(--card);border-bottom:1px solid var(--line);padding:11px 14px;display:flex;align-items:center;gap:7px;flex-shrink:0;}
.stat-chip{display:flex;align-items:center;gap:5px;border-radius:30px;padding:5px 11px;font:800 14px 'Hanken Grotesk',sans-serif;border:1.5px solid;}
.chip-fire{background:var(--warm-bg);border-color:var(--warm-bd);color:var(--warm-ink);}
.chip-xp{background:var(--vio-bg);border-color:var(--vio-bd);color:var(--vio-ink);}
.chip-mastery{background:var(--grn-bg);border-color:var(--grn-bd);color:var(--grn-ink);}
.top-actions{margin-left:auto;display:flex;align-items:center;gap:7px;}
.icon-btn{width:34px;height:34px;flex:none;border-radius:50%;border:1.5px solid var(--line-2);background:var(--card);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
#sync-msg{height:0;overflow:visible;text-align:center;position:relative;z-index:29;}
#sync-msg span{position:relative;top:2px;font-size:10.5px;color:var(--ink-3);transition:opacity .8s;}

/* CONTENT */
#content{flex:1;overflow-y:auto;padding:0 16px 96px;}

/* BOTTOM NAV */
#bottom-nav{position:sticky;bottom:0;z-index:30;background:var(--card);border-top:1px solid var(--line);display:flex;padding-bottom:env(safe-area-inset-bottom,0);flex-shrink:0;}
.nav-btn{flex:1;border:none;background:none;cursor:pointer;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:opacity .2s;}
.nav-btn-icon{font-size:20px;line-height:1;transition:filter .2s;}
.nav-btn-label{font:700 9.5px 'Hanken Grotesk',sans-serif;color:var(--ink-3);letter-spacing:.2px;}
.nav-btn.active .nav-btn-label{color:var(--primary-ink);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;animation:slide-in .2s ease;}
.modal-sheet{width:100%;max-width:480px;background:var(--card);border-radius:26px 26px 0 0;padding:24px 20px 32px;}

/* COMMON COMPONENTS */
.tab-title{font:800 22px 'Baloo 2',cursive;color:var(--ink);}
.tab-sub{font:600 13px 'Hanken Grotesk',sans-serif;color:var(--ink-2);margin-top:2px;}
.pill{display:inline-flex;align-items:center;border-radius:30px;padding:5px 11px;font:800 10px 'Hanken Grotesk',sans-serif;letter-spacing:.4px;text-transform:uppercase;}
.primary-btn{border:none;border-radius:18px;padding:16px;background:var(--primary);color:#fff;font:800 16px 'Baloo 2',cursive;box-shadow:0 5px 0 var(--primary-d);cursor:pointer;width:100%;}
.card-box{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 10px 26px -18px var(--shadow);}
.anim-rise{animation:vk-rise .4s ease;}

/* CHOICE BUTTONS */
.choice-btn{text-align:left;border-radius:14px;padding:14px 15px;font:600 14px 'Hanken Grotesk',sans-serif;line-height:1.4;cursor:pointer;border:2px solid var(--line-2);border-left:5px solid var(--line-2);background:var(--card);color:var(--ink);transition:all .15s;width:100%;}
.choice-btn:disabled{cursor:default;}
.choice-btn.correct{background:var(--good-soft);border-color:var(--good-bd);color:var(--good-ink);}
.choice-btn.wrong{background:var(--bad-soft);border-color:var(--bad-bd);color:var(--bad-ink);}
.choice-btn.dimmed{background:var(--soft);border-color:var(--line);color:var(--ink-3);}
.tf-btn{flex:1;border:none;border-radius:16px;padding:18px;font:800 16px 'Baloo 2',cursive;cursor:pointer;transition:all .15s;}
.tf-btn:disabled{cursor:default;}

/* PROGRESS BAR */
.prog-wrap{height:11px;border-radius:11px;background:var(--track);overflow:hidden;flex:1;}
.prog-bar{height:100%;border-radius:11px;background:linear-gradient(90deg,var(--primary),#8B6BFF);transition:width .3s;}
.speed-wrap{height:6px;border-radius:6px;background:var(--track);overflow:hidden;margin-top:9px;}
.speed-bar{height:100%;border-radius:6px;transition:width 1s linear,background .3s;}

function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function isDark(){return document.documentElement.getAttribute('data-theme')==='dark';}

function dueCount(){const now=Date.now(),cs=S.stats.cardStats;return TERMS.filter(t=>{const s=cs[t.id]||{correct:0};return (s.correct||0)<5&&(!s.nextDue||s.nextDue<=now);}).length;}

function parseCSV(text){
  const rows=[];let row=[],cur='',inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(c==='"'){if(inQ&&text[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(c===','&&!inQ){row.push(cur);cur='';}
    else if((c==='\n'||c==='\r')&&!inQ){if(c==='\r'&&text[i+1]==='\n')i++;row.push(cur);rows.push(row);row=[];cur='';}
    else cur+=c;
  }
  if(cur||row.length){row.push(cur);if(row.some(x=>x))rows.push(row);}
  return rows;
}
function fetchCSV(url){
  const ctrl=new AbortController();
  const to=setTimeout(()=>ctrl.abort(),9000);
  return fetch(url,{signal:ctrl.signal}).then(r=>{clearTimeout(to);if(!r.ok)throw new Error('HTTP '+r.status);return r.text();},e=>{clearTimeout(to);throw e;});
}
function buildTerms(tR,rR,sR,fR){
  const tr=parseCSV(tR).slice(1);
  const rr=rR?parseCSV(rR).slice(1):[];
  const sr=sR?parseCSV(sR).slice(1):[];
  const fr=fR?parseCSV(fR).slice(1):[];
  const rules={},scen={},tf={};
  rr.forEach(([id,val,label,type])=>{if(!id)return;(rules[id]=rules[id]||[]).push({val,label,type});});
  sr.forEach(([id,q,choice,w1,w2,w3,answer])=>{if(!id)return;(scen[id]=scen[id]||[]).push({q,choice,wrongs:[w1,w2,w3].filter(w=>w),answer});});
  fr.forEach(([id,stmt,answer,explain])=>{if(!id)return;(tf[id]=tf[id]||[]).push({stmt,answer:answer==='TRUE',explain});});
  return tr.filter(r=>r[0]).map(([id,name,full,family,image,tip,d2t,t0,t1,t2,t3])=>({
    id,name,full,family,image,tip,d2t,
    t2d:[t0,t1,t2,t3].filter(t=>t),
    rules:rules[id]||[],scenarios:scen[id]||[],tf:tf[id]||[],
  }));
}

  // fall back to GID (requires "entire document" publish). Both tried in parallel via race.
  function fetchTab(name, gid){
    return Promise.any([fetchCSV(SHEET_NAME+name), fetchCSV(SHEET_BASE+gid)]);
  }
  const res=await Promise.allSettled([
    fetchTab('Terms', SHEET_GIDS.Terms),
    fetchTab('Rules', SHEET_GIDS.Rules),
    fetchTab('Scenarios', SHEET_GIDS.Scenarios),
    fetchTab('TrueFalse', SHEET_GIDS.TrueFalse),
  ]);
  const [tR,rR,sR,fR]=res.map(x=>x.status==='fulfilled'?x.value:'');
  const missing=['Rules','Scenarios','TrueFalse'].filter((n,i)=>![rR,sR,fR][i]);
  if(!tR){
    if(cached){TERMS=cached.terms;return {terms:cached.terms,missing,fromCache:true};}
    throw new Error('Terms unreachable');
  }
  const terms=buildTerms(tR,rR,sR,fR);
  try{localStorage.setItem(CACHE_KEY,JSON.stringify({terms,missing,ts:Date.now()}));}catch(e){}
  return {terms,missing,fromCache:false};
}

async function loadDictionarySheet(){
  try{
    const r=await fetchCSV(DICT_URL);
    const rows=parseCSV(r).slice(1);
    rows.forEach(row=>{
      const word=(row[0]||'').trim(),def=(row[1]||'').trim();
      if(word&&def)DICT[word.toLowerCase()]={word,def};
    });
  }catch(e){console.warn('Dictionary tab not found');}
}

function buildDictFromTerms(){
  (TERMS||[]).forEach(t=>{
    const key=(t.name||'').toLowerCase();
    if(!key||DICT[key])return;
    let def=t.full||'';
    if(t.d2t&&t.d2t.length>8)def+=(def?'. ':'')+t.d2t.slice(0,130)+(t.d2t.length>130?'…':'');
    DICT[key]={word:t.name,def:def||t.name};
  });
}

function dictMatches(text){
  const t=(text||'').toLowerCase();
  const out=[],seen=new Set();
  Object.keys(DICT).forEach(k=>{if(seen.has(k)||!t.includes(k))return;seen.add(k);out.push(DICT[k]);});
  return out;
}

   ============================================================ */
function makeCur(queue,idx){
  if(idx>=queue.length)return null;
  const it=queue[idx],t=it.term,fi=FAM[t.family]||FAM.eval;
  const base={term:t,type:it.type,fam:t.family,famLabel:fi.label+' · '+t.name};
  if(it.type==='t2d'){const correct=t.t2d[0];return Object.assign(base,{typeLabel:'📖 Terme → Définition',question:`Que signifie « ${t.name} » (${t.full}) ?`,choices:shuf([...t.t2d]),correct,explain:t.image+(t.tip?'  💡 '+t.tip:'')});}
  if(it.type==='d2t'){const others=shuf(TERMS.filter(x=>x.id!==t.id)).slice(0,3).map(x=>x.name);return Object.assign(base,{typeLabel:'🔍 Définition → Terme',question:t.d2t,choices:shuf([t.name,...others]),correct:t.name,explain:t.image});}
  if(it.type==='img'){
    // Image mentale → identifier le terme. 3 noms aléatoires d'autres termes.
    const others=shuf(TERMS.filter(x=>x.id!==t.id)).slice(0,3).map(x=>x.name);
    return Object.assign(base,{typeLabel:'🎬 Scénario réel',question:t.image,choices:shuf([t.name,...others]),correct:t.name,explain:t.full+(t.tip?'  💡 '+t.tip:'')});
  }
  return Object.assign(base,{typeLabel:'✅ Vrai ou Faux ?',question:'« '+it.tf.stmt+' »',isTF:true,correctBool:it.tf.answer,explain:it.tf.explain||''});
}
function buildQueue(mode){
  const md=MODES.find(x=>x.id===mode)||MODES[0];const n=md.n;let qs=[];
  if(mode==='speed'){TERMS.forEach(t=>{if(t.t2d&&t.t2d.length)qs.push({type:'t2d',term:t});});return shuf(qs).slice(0,n);}
  if(mode==='boss'){
    TERMS.forEach(t=>{
      if(t.image)qs.push({type:'img',term:t});        // image→term
      (t.tf||[]).forEach(tf=>qs.push({type:'tf',term:t,tf}));
    });
    return shuf(qs).slice(0,n);
  }
  TERMS.forEach(t=>{
    if(t.t2d&&t.t2d.length&&(mode==='all'||mode==='term2def'))qs.push({type:'t2d',term:t});
    if(t.d2t&&(mode==='all'||mode==='def2term'))qs.push({type:'d2t',term:t});
    if(t.image&&(mode==='all'||mode==='scenario'))qs.push({type:'img',term:t}); // image→term
    (t.tf||[]).forEach(tf=>{if(mode==='all'||mode==='tf')qs.push({type:'tf',term:t,tf});});
  });
  return shuf(qs).slice(0,n);
}
function saveSession(){
  const q=S.q;if(q.phase!=='playing')return;
  try{
    const ids=q.queue.map(it=>({type:it.type,termId:it.term.id,
      scIdx:it.type==='sc'?(it.term.scenarios||[]).indexOf(it.sc):-1,
      tfIdx:it.type==='tf'?(it.term.tf||[]).indexOf(it.tf):-1}));
    localStorage.setItem(SESSION_KEY,JSON.stringify({mode:q.mode,ids,idx:q.idx,cCorrect:q.cCorrect,cWrong:q.cWrong,cStreak:q.cStreak,mistakes:q.mistakes,startedAt:q.startedAt}));
  }catch(e){}
}
function loadSavedSession(){
  try{const d=JSON.parse(localStorage.getItem(SESSION_KEY)||'null');if(!d)return null;if(Date.now()-(d.startedAt||0)>30*60*1000){localStorage.removeItem(SESSION_KEY);return null;}return d;}catch(e){return null;}
}

    return `<div style="position:relative;background:var(--card);border:1px solid var(--line);border-top:4px solid ${md.color};border-radius:18px;padding:15px 14px;box-shadow:0 8px 22px -16px var(--shadow);display:flex;flex-direction:column;">
      ${md.badge?`<span style="position:absolute;top:12px;right:12px;background:${md.color}22;color:${md.color};font:800 8.5px 'Hanken Grotesk',sans-serif;letter-spacing:.5px;padding:3px 7px;border-radius:20px;">${md.badge}</span>`:''}

function renderQuizPlaying(){
  const q=S.q,cur=q.cur;
  if(!cur)return renderQuizSelect();
  const fi=FAM[cur.fam]||FAM.eval;
  const qColor=famColor(cur.fam),qSoft=famSoft(cur.fam);
  const progPct=q.queue.length?Math.round(q.idx/q.queue.length*100):0;
  const isSpeed=q.mode==='speed';
  const speedPct=Math.round(q.timeLeft/SPEED_TIME*100);
  const speedColor=q.timeLeft>SPEED_TIME*0.5?'var(--good-bd)':q.timeLeft>SPEED_TIME*0.25?'#F59F00':'var(--bad-bd)';
  const dictItems=dictMatches(cur.question);
  const dictBg=S.dictOpen?'var(--primary-soft)':'var(--card)';
  const dictBd=S.dictOpen?'var(--primary)':'var(--line-2)';
  const dictColor=S.dictOpen?'var(--primary-ink)':'var(--ink-2)';
  const modeObj=MODES.find(x=>x.id===q.mode)||MODES[0];
  let choicesHTML='';
  if(cur.isTF){
    const tfBtns=[{label:'✅ VRAI',val:true},{label:'❌ FAUX',val:false}].map(b=>{
      let bg='var(--card)',bd='var(--line-2)',color='var(--ink)',shadow='0 4px 0 var(--line)';
      if(q.answered){const isC=b.val===cur.correctBool,isCh=b.val===q.chosenBool;
        if(isC){bg='var(--good-soft)';bd='var(--good-bd)';color='var(--good-ink)';shadow='0 4px 0 var(--good-line)';}
        else if(isCh){bg='var(--bad-soft)';bd='var(--bad-bd)';color='var(--bad-ink)';shadow='0 4px 0 var(--bad-line)';}
        else{color='var(--ink-3)';bd='var(--line)';shadow='0 4px 0 var(--line)';}}
      return `<button class="tf-btn" onclick="APP.answer(null,${b.val})" ${q.answered?'disabled':''} style="background:${bg};border:2px solid ${bd};color:${color};box-shadow:${shadow};">${b.label}</button>`;
    }).join('');
    choicesHTML=`<div style="display:flex;gap:11px;margin-top:16px;">${tfBtns}</div>`;
  } else {
    const chBtns=(cur.choices||[]).map(txt=>{
      let cls='choice-btn';
      if(q.answered){if(txt===cur.correct)cls+=' correct';else if(txt===q.chosen)cls+=' wrong';else cls+=' dimmed';}
      return `<button class="${cls}" onclick="APP.answer('${h(txt).replace(/'/g,"&#39;")}',null)" ${q.answered?'disabled':''}>${h(txt)}</button>`;
    }).join('');
    choicesHTML=`<div style="display:flex;flex-direction:column;gap:10px;margin-top:16px;">${chBtns}</div>`;
  }
  let fbHTML='';
  if(q.answered){
    const ok=q.ok;
    const fbBg=ok?'var(--good-soft)':'var(--bad-soft)',fbBd=ok?'var(--good-line)':'var(--bad-line)';
    const fbTitle=ok?'Bravo ! +10 XP':'Pas tout à fait';
    const fbTc=ok?'var(--good-ink)':'var(--bad-ink)';
    const mood=ok?'wow':'oops';
    const nextLabel=(q.idx+1>=q.queue.length)?'Voir le résultat →':'Continuer →';
    fbHTML=`<div style="display:flex;gap:11px;align-items:flex-start;margin-top:16px;background:${fbBg};border:1px solid ${fbBd};border-radius:15px;padding:13px 14px;animation:slide-in .3s ease;">
      <div style="width:42px;height:42px;flex:none;">${vkSVG(mood,42,42)}</div>
      <div style="flex:1;">
        <div style="font:800 13.5px 'Baloo 2',cursive;color:${fbTc};">${fbTitle}</div>
        <div style="font:600 12.5px 'Hanken Grotesk',sans-serif;color:${fbTc};line-height:1.55;margin-top:2px;opacity:.85;">${h(cur.explain||'')}</div>
      </div>
    </div>
    <button onclick="APP.nextQ()" style="width:100%;border:none;border-radius:16px;padding:14px;margin-top:12px;background:var(--primary);color:#fff;font:800 15px 'Baloo 2',cursive;box-shadow:0 4px 0 var(--primary-d);cursor:pointer;">${nextLabel}</button>`;
  }
  let dictPanelHTML='';
  if(S.dictOpen){
    const dItems=dictItems.map(d=>`<div style="padding:7px 0;border-top:1px solid var(--line);"><div style="font:800 12.5px 'Hanken Grotesk',sans-serif;color:var(--primary-ink);">${h(d.word)}</div><div style="font:500 11.5px 'Hanken Grotesk',sans-serif;color:var(--ink-2);line-height:1.45;margin-top:2px;">${h(d.def)}</div></div>`).join('');
    dictPanelHTML=`<div style="background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 15px;margin-top:11px;box-shadow:0 8px 22px -16px var(--shadow);animation:vk-rise .25s ease;">
      <div style="font:800 12px 'Baloo 2',cursive;color:var(--ink);margin-bottom:6px;">📖 Vocabulaire${dictItems.length?' ('+dictItems.length+')':''}</div>
      ${dItems||'<div style="font:500 12px \'Hanken Grotesk\',sans-serif;color:var(--ink-3);text-align:center;padding:6px 0;">Aucun terme reconnu dans cette question.</div>'}
    </div>`;
  }
  return `<div class="anim-rise" style="padding-top:14px;">
    <div style="display:flex;align-items:center;gap:8px;">
      <button onclick="APP.confirmAbandon()" style="flex:none;border:1.5px solid var(--line-2);background:var(--card);border-radius:30px;padding:7px 13px;font:700 12px 'Hanken Grotesk',sans-serif;color:var(--ink-2);cursor:pointer;white-space:nowrap;">← Quitter</button>
      <div style="flex:1;font:800 12.5px 'Hanken Grotesk',sans-serif;color:var(--ink-3);text-align:center;">${modeObj.icon} ${modeObj.name}</div>
      <button onclick="APP.toggleDict()" title="Vocabulaire" style="width:32px;height:32px;flex:none;border-radius:50%;border:1.5px solid ${dictBd};background:${dictBg};color:${dictColor};font:800 14px 'Hanken Grotesk',sans-serif;cursor:pointer;">?</button>
    </div>
    ${dictPanelHTML}
    <div style="display:flex;align-items:center;gap:12px;margin-top:12px;">
      <div class="prog-wrap"><div class="prog-bar" style="width:${progPct}%;"></div></div>
      <div style="font:800 13px 'Hanken Grotesk',sans-serif;color:var(--warm-ink);">🔥 ${q.cStreak}</div>
    </div>
    ${isSpeed?`<div class="speed-wrap"><div class="speed-bar" style="width:${speedPct}%;background:${speedColor};"></div></div>`:''}
    <div class="card-box" style="margin-top:13px;">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
        <span style="background:${qSoft};color:${qColor};font:800 10px 'Hanken Grotesk',sans-serif;letter-spacing:.4px;text-transform:uppercase;padding:5px 11px;border-radius:30px;">${h(cur.famLabel)}</span>
        <span style="font:700 10.5px 'Hanken Grotesk',sans-serif;color:var(--ink-3);">${q.idx+1} / ${q.queue.length}</span>
      </div>
      <div style="font:700 11px 'Hanken Grotesk',sans-serif;letter-spacing:.5px;text-transform:uppercase;color:var(--ink-3);margin-top:14px;">${cur.typeLabel}</div>
      <div style="font:700 17px 'Hanken Grotesk',sans-serif;line-height:1.5;color:var(--ink);margin-top:7px;">${h(cur.question)}</div>
      ${choicesHTML}
      ${fbHTML}
    </div>
  </div>`;
}

function renderQuizEnded(){
  const q=S.q,st=S.stats;
  const total=q.cCorrect+q.cWrong||1;
  const pct=Math.round(q.cCorrect/total*100);
  let endMood='happy',endTitle='Continue comme ça !',endColor='var(--primary)',endScore=pct+'%',endSub='';
  if(q.lost){endMood='oops';endTitle='Raté !';endColor='var(--bad-bd)';endScore=`${q.idx}/${q.queue.length}`;endSub=`Tombé à la question ${q.idx+1}. Réessaie !`;}
  else{endMood=pct>=85?'wow':pct>=55?'happy':'oops';endTitle=pct>=85?'Parfait !':pct>=55?'Bien joué !':'Continue comme ça !';endColor=pct>=55?'var(--good-ink)':'var(--warn-ink)';endSub=`${q.cCorrect} bonnes · meilleur 🔥 ${st.bestStreak}`;}
  const bonusXp=q.bonusXp||0;
  const mistakesHTML=(q.mistakes||[]).length>0
    ?`<div style="margin-top:18px;background:var(--bad-soft);border:1px solid var(--bad-line);border-radius:16px;padding:14px 15px;">
      <div style="font:800 13px 'Baloo 2',cursive;color:var(--bad-ink);margin-bottom:8px;">À revoir (${q.mistakes.length})</div>
      ${q.mistakes.map(mk=>`<div style="font:600 12.5px 'Hanken Grotesk',sans-serif;color:var(--bad-ink);padding:4px 0;border-top:1px solid var(--bad-line);">${h(mk.term)}${mk.correct&&mk.correct!==mk.term?' → '+h(mk.correct):''}</div>`).join('')}
    </div>`:
    `<div style="margin-top:16px;background:var(--good-soft);border:1px solid var(--good-line);border-radius:16px;padding:14px 15px;text-align:center;font:700 13px 'Hanken Grotesk',sans-serif;color:var(--good-ink);">✨ Aucune erreur — impeccable !</div>`;
  return `<div class="anim-rise" style="padding-top:22px;display:flex;flex-direction:column;align-items:center;text-align:center;">
    <div style="width:88px;height:88px;animation:vk-pop .4s ease;">${vkSVG(endMood,88,88)}</div>
    <div style="font:800 28px 'Baloo 2',cursive;color:${endColor};margin-top:12px;">${endTitle}</div>
    <div style="font:800 48px 'Baloo 2',cursive;color:var(--ink);line-height:1;">${endScore}</div>
    <div style="font:600 13px 'Hanken Grotesk',sans-serif;color:var(--ink-2);margin-top:4px;">${endSub}</div>
    ${bonusXp>0?`<div style="background:var(--vio-bg);border:1.5px solid var(--vio-bd);border-radius:14px;padding:8px 18px;margin-top:10px;font:800 14px 'Baloo 2',cursive;color:var(--vio-ink);">✨ Bonus +${bonusXp} XP</div>`:''}
    ${mistakesHTML}
    <div style="display:flex;gap:11px;margin-top:18px;width:100%;">

      <button onclick="APP.backToSelect()" style="flex:1;border:1.5px solid var(--line-2);border-radius:16px;padding:14px;background:var(--card);color:var(--ink-2);font:700 13px 'Hanken Grotesk',sans-serif;cursor:pointer;">Modes →</button>
    </div>
  </div>`;

function renderQuiz(){
  const phase=S.q.phase;
  if(phase==='select')return renderQuizSelect();
  if(phase==='playing')return renderQuizPlaying();
  if(phase==='ended')return renderQuizEnded();
  return renderQuizSelect();
}

function renderAnki(){
  const a=S.anki,cs=S.stats.cardStats,t=TERMS;
  const mastered=masteredCount();
  const seen=t.filter(x=>cs[x.id]&&cs[x.id].lastSeen).length;
  const stats3=`
    <div style="display:flex;gap:10px;margin-top:14px;">
      <div style="flex:1;text-align:center;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 6px;"><div style="font:800 22px 'Baloo 2',cursive;color:var(--good-ink);">${mastered}</div><div style="font:600 10.5px 'Hanken Grotesk',sans-serif;color:var(--ink-2);">Maîtrisés ⭐</div></div>
      <div style="flex:1;text-align:center;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 6px;"><div style="font:800 22px 'Baloo 2',cursive;color:var(--primary-ink);">${seen}</div><div style="font:600 10.5px 'Hanken Grotesk',sans-serif;color:var(--ink-2);">Vus</div></div>
      <div style="flex:1;text-align:center;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 6px;"><div style="font:800 22px 'Baloo 2',cursive;color:var(--ink);">${t.length-seen}</div><div style="font:600 10.5px 'Hanken Grotesk',sans-serif;color:var(--ink-2);">Nouveaux</div></div>
    </div>`;
  if(a.done){
    return `<div class="anim-rise" style="padding-top:18px;">
      <div class="tab-title">Révision</div>${stats3}
      <div style="display:flex;flex-direction:column;align-items:center;text-align:center;padding:40px 0;">
        <div style="font-size:52px;margin-bottom:12px;">🎉</div>
        <div style="font:800 19px 'Baloo 2',cursive;color:var(--good-ink);">Tout révisé !</div>
        <div style="font:600 13px 'Hanken Grotesk',sans-serif;color:var(--ink-2);margin-top:4px;">Toutes les cartes dues ont été vues.</div>
        <button onclick="APP.restartAnki()" style="border:none;border-radius:16px;padding:14px 30px;margin-top:18px;background:var(--primary);color:#fff;font:800 15px 'Baloo 2',cursive;box-shadow:0 5px 0 var(--primary-d);cursor:pointer;">🔄 Recommencer</button>
      </div>
    </div>`;
  }
  const card=a.queue[a.idx];
  if(!card)return `<div class="anim-rise" style="padding-top:18px;"><div class="tab-title">Révision</div>${stats3}</div>`;
  const fi=FAM[card.family]||FAM.eval;
  const c=famColor(card.family),so=famSoft(card.family);
  const s=cs[card.id]||{correct:0,wrong:0};
  const isMaster=(s.correct||0)>=5;
  const pips=[0,1,2,3,4].map(i=>`<div style="width:10px;height:10px;border-radius:50%;background:${i<(s.correct||0)?'var(--good-bd)':'var(--line)'};"></div>`).join('');
  let backHTML='';
  if(a.flipped){
    backHTML=`<div style="animation:slide-in .3s ease;">
      <div style="background:var(--soft);border-left:3px solid ${c};border-radius:10px;padding:11px 13px;margin-top:14px;">
        <div style="font:800 9.5px 'Hanken Grotesk',sans-serif;letter-spacing:.5px;text-transform:uppercase;color:var(--ink-3);margin-bottom:4px;">Image mentale</div>
        <div style="font:500 13px 'Hanken Grotesk',sans-serif;line-height:1.55;color:var(--ink-soft);">${h(card.image||'')}</div>
      </div>
      ${card.tip?`<div style="margin-top:10px;background:var(--good-soft);border-left:3px solid var(--good-bd);border-radius:9px;padding:9px 11px;font:600 12px 'Hanken Grotesk',sans-serif;color:var(--good-ink);line-height:1.5;">💡 ${h(card.tip)}</div>`:''}
      <div style="display:flex;gap:11px;margin-top:16px;">
        <button onclick="APP.ankiAnswer(false)" style="flex:1;border:none;border-radius:15px;padding:14px;background:var(--bad-soft);color:var(--bad-ink);font:800 14px 'Baloo 2',cursive;cursor:pointer;">❌ À revoir</button>
        <button onclick="APP.ankiAnswer(true)" style="flex:1;border:none;border-radius:15px;padding:14px;background:var(--good-soft);color:var(--good-ink);font:800 14px 'Baloo 2',cursive;cursor:pointer;">✅ Je savais</button>
      </div>
    </div>`;

      <div style="display:flex;align-items:center;gap:8px;">
        <div style="display:flex;gap:5px;">${pips}</div>
        ${isMaster?`<span style="font:800 9px 'Hanken Grotesk',sans-serif;color:var(--good-ink);background:var(--good-soft);padding:2px 7px;border-radius:20px;margin-left:4px;">⭐ Maîtrisé</span>`:''}
        <span style="margin-left:auto;font:700 11px 'Hanken Grotesk',sans-serif;color:var(--ink-3);">${a.idx+1} / ${a.queue.length}</span>
      </div>
      <span style="display:inline-flex;align-self:flex-start;background:${so};color:${c};font:800 10px 'Hanken Grotesk',sans-serif;letter-spacing:.4px;text-transform:uppercase;padding:5px 11px;border-radius:30px;margin-top:16px;">${h(fi.label)}</span>

}

function renderProfil(){
  const st=S.stats,m=st.meta,t=TERMS;
  const mastered=masteredCount(),total=t.length||1;
  const pct=Math.round(mastered/total*100);
  const level=Math.floor((m.xp||0)/100)+1;
  const xpInLevel=(m.xp||0)%100;
  const rows=t.map(x=>{const s=st.cardStats[x.id]||{correct:0,wrong:0};return Object.assign({},x,{_c:s.correct||0,_w:s.wrong||0,_m:(s.correct||0)>=5});}).sort((a,b)=>b._c-a._c);
  const rowsHTML=rows.map(r=>{
    const c=famColor(r.family);
    const pips=[0,1,2,3,4].map(i=>`<div style="width:8px;height:8px;border-radius:50%;background:${i<r._c?'var(--good-bd)':'var(--line)'};"></div>`).join('');
    return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);">
      <div style="flex:1;">
        <div style="font:700 13px 'Hanken Grotesk',sans-serif;color:var(--ink);">${h(r.name)}${r._m?' ⭐':''}</div>
        <div style="font:500 11px 'Hanken Grotesk',sans-serif;color:var(--ink-3);">${h((FAM[r.family]||FAM.eval).label)}</div>
      </div>
      <div style="display:flex;gap:4px;">${pips}</div>
    </div>`;
  }).join('');
  return `<div class="anim-rise" style="padding-top:18px;">
    <div class="tab-title">Profil</div>
    <div style="background:linear-gradient(135deg,var(--hero1),var(--hero2));border-radius:22px;padding:18px;margin-top:14px;display:flex;align-items:center;gap:14px;">
      <div style="width:56px;height:56px;flex:none;">${vkSVG('happy',56,56)}</div>
      <div>
        <div style="font:800 20px 'Baloo 2',cursive;color:#fff;">Niveau ${level}</div>
        <div style="font:600 12px 'Hanken Grotesk',sans-serif;color:#C9BFE0;margin-top:2px;">${m.xp||0} XP · Streak 🔥 ${m.dayStreak||0}</div>
        <div style="height:6px;width:140px;border-radius:6px;background:rgba(255,255,255,.2);margin-top:8px;overflow:hidden;"><div style="width:${xpInLevel}%;height:100%;border-radius:6px;background:var(--primary);"></div></div>
        <div style="font:600 10.5px 'Hanken Grotesk',sans-serif;color:#9A8FC0;margin-top:3px;">${xpInLevel}/100 XP vers niveau ${level+1}</div>
      </div>
    </div>
    <div style="background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px 16px;margin-top:12px;display:flex;align-items:center;gap:14px;box-shadow:0 8px 22px -16px var(--shadow);">
      <div style="position:relative;width:60px;height:60px;flex:none;">
        <svg width="60" height="60" viewBox="0 0 60 60"><circle cx="30" cy="30" r="24" fill="none" stroke="var(--ring)" stroke-width="7"/><circle cx="30" cy="30" r="24" fill="none" stroke="var(--primary)" stroke-width="7" stroke-linecap="round" stroke-dasharray="${Math.round(pct*1.508)} 150.8" transform="rotate(-90 30 30)"/></svg>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font:800 15px 'Baloo 2',cursive;color:var(--ink);">${pct}%</div>
      </div>
      <div>
        <div style="font:800 15px 'Baloo 2',cursive;color:var(--ink);">Maîtrise globale</div>
        <div style="font:600 12px 'Hanken Grotesk',sans-serif;color:var(--ink-2);margin-top:2px;">${mastered} / ${total} termes maîtrisés</div>
        <div style="font:600 11px 'Hanken Grotesk',sans-serif;color:var(--ink-2);margin-top:2px;">✓ ${st.correct} bonnes · ✗ ${st.wrong} mauvaises</div>
      </div>
    </div>
    <div style="font:800 12px 'Hanken Grotesk',sans-serif;letter-spacing:.6px;color:var(--ink-3);text-transform:uppercase;margin:22px 2px 10px;">Tous les termes</div>
    <div style="background:var(--card);border:1px solid var(--line);border-radius:16px;padding:4px 14px 4px;box-shadow:0 8px 22px -16px var(--shadow);">${rowsHTML}</div>
  </div>`;
}

function render(){
  const c=document.getElementById('content');
  if(!c)return;
  if(!S.ready){c.innerHTML=renderSplash();return;}
  switch(S.tab){
    case 'home':c.innerHTML=renderHome();break;
    case 'gloss':c.innerHTML=renderGloss();break;
    case 'quiz':c.innerHTML=renderQuiz();break;
    case 'anki':c.innerHTML=renderAnki();break;
    case 'profil':c.innerHTML=renderProfil();break;
    default:c.innerHTML=renderHome();
  }
  renderNav();
  renderTopBar();
}

/* ============================================================
   APP OBJECT (global event handlers)
   ============================================================ */
const APP={
  toggleTheme(){
    const next=isDark()?'light':'dark';
    document.documentElement.setAttribute('data-theme',next);
    try{localStorage.setItem('mlmemos_theme',next);}catch(e){}
    render();
  },
  signIn(){
    try{
      const p=new firebase.auth.GoogleAuthProvider();
      p.setCustomParameters({prompt:'select_account'}); // force le sélecteur de compte
      firebase.auth().signInWithPopup(p);
    }catch(e){flashSync('⚠️ Connexion impossible');}
  },
  signOut(){
    const m=document.getElementById('abandon-modal');
    m.style.display='';
    m.innerHTML=`<div class="modal-overlay" onclick="APP.closeAbandon()">
      <div class="modal-sheet" onclick="event.stopPropagation()">
        <div style="font:800 18px 'Baloo 2',cursive;color:var(--ink);">Se déconnecter ?</div>
        <div style="font:600 13px 'Hanken Grotesk',sans-serif;color:var(--ink-2);margin-top:6px;line-height:1.5;">Ta progression locale sera conservée. La sync cloud sera désactivée.</div>
        <div style="display:flex;gap:11px;margin-top:18px;">
          <button onclick="APP.closeAbandon()" style="flex:1;border:1.5px solid var(--line-2);border-radius:14px;padding:13px;background:var(--card);color:var(--ink-2);font:700 13px 'Hanken Grotesk',sans-serif;cursor:pointer;">Annuler</button>
          <button onclick="APP._doSignOut()" style="flex:1;border:none;border-radius:14px;padding:13px;background:var(--bad-bd);color:#fff;font:800 13px 'Baloo 2',cursive;cursor:pointer;">Déconnecter</button>
        </div>
      </div>
    </div>`;
  },
  _doSignOut(){APP.closeAbandon();try{firebase.auth().signOut();}catch(e){}},
  retryLoad(){S.loadError=false;S.ready=false;render();init();},
  setTab(tab){
    if(S.q.phase==='playing'&&S.tab==='quiz'&&tab!=='quiz'){S.pendingTab=tab;APP.confirmAbandon();return;}
    clearInterval(_spdT);
    if(tab==='quiz'&&S.q.phase==='ended'){S.q=Object.assign({},S.q,{phase:'select'});}
    S.tab=tab;S.dictOpen=false;
    if(tab==='anki')APP.buildAnki();
    render();
  },
  goRealm(fam){S.gFilter=fam;S.gSearch='';S.tab='gloss';render();},
  setGFilter(f){
    S.gFilter=f;
    const el=document.getElementById('gloss-cards');
    if(el){el.innerHTML=glossCardsHTML();}else render();
  },
  setGSearch(v){
    S.gSearch=v;
    const el=document.getElementById('gloss-cards');
    if(el){el.innerHTML=glossCardsHTML();}else render();
    // Keep input focused with cursor at end
    const inp=document.getElementById('gloss-search');
    if(inp&&document.activeElement!==inp){inp.focus();inp.setSelectionRange(v.length,v.length);}
  },
  // Quiz
  launchSession(mode){
    clearInterval(_spdT);
    const queue=buildQueue(mode);
    if(!queue.length){
      // No questions available for this mode — show user-friendly error
      const c=document.getElementById('content');
      if(c){const warn=c.querySelector('#mode-warn');if(!warn){const d=document.createElement('div');d.id='mode-warn';d.style.cssText='background:var(--warn-soft);border:1px solid var(--warm-bd);border-radius:14px;padding:11px 13px;margin-top:13px;font:600 12px \'Hanken Grotesk\',sans-serif;color:var(--warn-ink);';d.textContent='⚠️ Aucune question disponible pour ce mode. Vérifie que le Google Sheet est bien publié (Fichier → Partager → Publier).';c.querySelector('.anim-rise')?.prepend(d);}}
      return;
    }
    S.tab='quiz';
    S.q={phase:'playing',mode,queue,idx:0,cur:makeCur(queue,0),answered:false,chosen:null,chosenBool:null,ok:false,lost:false,timeLeft:SPEED_TIME,cCorrect:0,cWrong:0,cStreak:0,mistakes:[],startedAt:Date.now(),bonusXp:0};
    S.dictOpen=false;
    saveSession();
    render();
    if(mode==='speed')APP.startSpeed();
  },
  resumeSession(){
    const d=loadSavedSession();if(!d||!TERMS.length)return;
    const queue=(d.ids||[]).map(qi=>{const term=TERMS.find(t=>t.id===qi.termId);if(!term)return null;
      const it={type:qi.type,term};if(qi.type==='sc')it.sc=(term.scenarios||[])[qi.scIdx];if(qi.type==='tf')it.tf=(term.tf||[])[qi.tfIdx];return it;}).filter(Boolean);
    S.q={phase:'playing',mode:d.mode,queue,idx:Math.min(d.idx||0,queue.length),cur:makeCur(queue,d.idx||0),answered:false,chosen:null,chosenBool:null,ok:false,lost:false,timeLeft:SPEED_TIME,cCorrect:d.cCorrect||0,cWrong:d.cWrong||0,cStreak:d.cStreak||0,mistakes:d.mistakes||[],startedAt:d.startedAt,bonusXp:0};
    S.dictOpen=false;render();if(d.mode==='speed')APP.startSpeed();
  },
  discardSession(){try{localStorage.removeItem(SESSION_KEY);}catch(e){}render();},
  backToSelect(){clearInterval(_spdT);S.q=Object.assign({},S.q,{phase:'select'});render();},
  toggleDict(){S.dictOpen=!S.dictOpen;render();},
  answer(choice,boolVal,timedOut){
    const q=S.q;if(q.answered)return;clearInterval(_spdT);
    const cur=q.cur;let ok;
    if(timedOut)ok=false;
    else if(cur.isTF)ok=(boolVal===cur.correctBool);
    else ok=(choice===cur.correct);
    const patch={answered:true,ok};
    if(cur.isTF)patch.chosenBool=boolVal;else patch.chosen=choice;
    if(ok){patch.cCorrect=q.cCorrect+1;patch.cStreak=q.cStreak+1;}else{patch.cWrong=q.cWrong+1;patch.cStreak=0;}
    if(!ok){patch.mistakes=(q.mistakes||[]).concat([{term:cur.term.name,correct:cur.isTF?(cur.correctBool?'VRAI':'FAUX'):cur.correct}]);}
    if(q.mode==='boss'&&!ok)patch.lost=true;
    if(ok){S.stats.correct++;if(patch.cStreak>S.stats.bestStreak)S.stats.bestStreak=patch.cStreak;}else S.stats.wrong++;
    Object.assign(S.q,patch);
    bumpDaily(ok);saveSession();saveAll();render();
    if(q.mode==='boss'&&!ok){setTimeout(()=>{APP.endSession(true);},1400);}
  },
  nextQ(){
    const q=S.q;
    if(q.lost){APP.endSession(true);return;}
    const ni=q.idx+1;
    if(ni>=q.queue.length){APP.endSession(false);return;}
    S.q=Object.assign({},q,{idx:ni,cur:makeCur(q.queue,ni),answered:false,chosen:null,chosenBool:null,ok:false,timeLeft:SPEED_TIME});
    S.dictOpen=false;saveSession();render();
    if(q.mode==='speed')APP.startSpeed();
  },
  endSession(bossLost){
    clearInterval(_spdT);
    try{localStorage.removeItem(SESSION_KEY);}catch(e){}
    const q=S.q;const total=q.cCorrect+q.cWrong||1;const pct=Math.round(q.cCorrect/total*100);
    const bonus=(!bossLost&&pct===100)?20:(!bossLost&&pct>=80)?10:0;
    if(bonus)S.stats.meta.xp=(S.stats.meta.xp||0)+bonus;
    S.q=Object.assign({},q,{phase:'ended',lost:!!bossLost,bonusXp:bonus,answered:false});
    S.dictOpen=false;saveAll();render();
  },
  startSpeed(){
    clearInterval(_spdT);S.q.timeLeft=SPEED_TIME;
    _spdT=setInterval(()=>{
      const tl=S.q.timeLeft-1;
      if(tl<=0){clearInterval(_spdT);APP.answer(null,null,true);}
      else{S.q.timeLeft=tl;const bar=document.querySelector('.speed-bar');if(bar){bar.style.width=Math.round(tl/SPEED_TIME*100)+'%';const sc=tl>SPEED_TIME*0.5?'var(--good-bd)':tl>SPEED_TIME*0.25?'#F59F00':'var(--bad-bd)';bar.style.background=sc;}}
    },1000);
  },
  // Abandon modal
  confirmAbandon(){
    const m=document.getElementById('abandon-modal');
    m.style.display='';
    m.innerHTML=`<div class="modal-overlay" onclick="APP.closeAbandon()">
      <div class="modal-sheet" onclick="event.stopPropagation()">
        <div style="font:800 18px 'Baloo 2',cursive;color:var(--ink);">Quitter la session ?</div>
        <div style="font:600 13px 'Hanken Grotesk',sans-serif;color:var(--ink-2);margin-top:6px;line-height:1.5;">Ta progression sera sauvegardée. Tu pourras reprendre plus tard.</div>
        <div style="display:flex;gap:11px;margin-top:18px;">
          <button onclick="APP.closeAbandon()" style="flex:1;border:1.5px solid var(--line-2);border-radius:14px;padding:13px;background:var(--card);color:var(--ink-2);font:700 13px 'Hanken Grotesk',sans-serif;cursor:pointer;">Continuer</button>
          <button onclick="APP.doAbandon()" style="flex:1;border:none;border-radius:14px;padding:13px;background:var(--bad-bd);color:#fff;font:800 13px 'Baloo 2',cursive;cursor:pointer;">Quitter</button>
        </div>
      </div>
    </div>`;
  },
  closeAbandon(){
    const m=document.getElementById('abandon-modal');
    m.style.display='none';m.innerHTML='';S.pendingTab=null;
  },
  doAbandon(){
    clearInterval(_spdT);
    try{localStorage.removeItem(SESSION_KEY);}catch(e){}
    const pt=S.pendingTab||'quiz';
    S.q=Object.assign({},S.q,{phase:'select'});S.pendingTab=null;S.dictOpen=false;
    document.getElementById('abandon-modal').style.display='none';
    document.getElementById('abandon-modal').innerHTML='';
    if(pt==='anki')APP.buildAnki();
    S.tab=pt;render();
  },
  // Anki
  buildAnki(){
    const now=Date.now(),cs=S.stats.cardStats;
    let due=[],later=[],mastered=[];
    TERMS.forEach(t=>{const s=cs[t.id]||{correct:0};if((s.correct||0)>=5)mastered.push(t);else if(!s.nextDue||s.nextDue<=now)due.push(t);else later.push(t);});
    const few=shuf(mastered).slice(0,Math.max(1,Math.ceil(mastered.length/5)));
    const queue=shuf([...due,...later,...few]);
    S.anki={queue,idx:0,flipped:false,done:queue.length===0};
  },
  flipAnki(){S.anki=Object.assign({},S.anki,{flipped:true});render();},
  ankiAnswer(knew){
    const a=S.anki,card=a.queue[a.idx];if(!card)return;
    const cs=Object.assign({},S.stats.cardStats);
    const s=Object.assign({correct:0,wrong:0},cs[card.id]);
    if(knew){s.correct=Math.min((s.correct||0)+1,5);const iv=[86400000,172800000,345600000,604800000,1209600000];s.nextDue=Date.now()+iv[Math.min((s.correct||1)-1,4)];}
    else{s.correct=Math.max((s.correct||0)-1,0);s.wrong=(s.wrong||0)+1;s.nextDue=Date.now()+300000;}
    s.lastSeen=Date.now();cs[card.id]=s;
    S.stats.cardStats=cs;
    const ni=a.idx+1;
    S.anki=Object.assign({},a,{idx:ni,flipped:false,done:ni>=a.queue.length});
    bumpDaily(false);saveAll();render();
  },
  restartAnki(){APP.buildAnki();render();},
};

/* ============================================================
   INIT
   ============================================================ */
async function init(){
  loadLocal();
  renderTopBar();
  render();
  try{
    const res=await loadTerms();
    TERMS=res.terms;
    buildDictFromTerms();
    loadDictionarySheet(); // background, no await
    S.ready=true;
    const miss=res.missing||[];
    flashSync(miss.length?`⚠️ ${TERMS.length} termes · ${miss.join(', ')} indispo.`:`✅ ${TERMS.length} termes chargés`);
    APP.buildAnki();
    const saved=loadSavedSession();
    if(saved&&TERMS.length){// keep select phase, show resume card
    }
    render();
  }catch(e){
    S.loadError=true;S.ready=false;
    render();
    console.error(e);
  }
}
</script>
